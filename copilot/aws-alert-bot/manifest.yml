name: aws-alert-bot
type: Backend Service

network:
  vpc:
    placement: private

image:
  build: Dockerfile

variables:
  AWS_REGION: ap-south-1
  OLLAMA_BASE_URL: http://localhost:11434
  OLLAMA_MODEL: qwen2.5:7b

secrets:
  EMAIL_USERNAME: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/ALERT_BOT_EMAIL_USERNAME
  EMAIL_PASSWORD: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/ALERT_BOT_EMAIL_PASSWORD
  AWS_ACCESS_KEY_ID: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/ALERT_BOT_AWS_ACCESS_KEY_ID
  AWS_SECRET_ACCESS_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/ALERT_BOT_AWS_SECRET_ACCESS_KEY
  AWS_SESSION_TOKEN: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/ALERT_BOT_AWS_SESSION_TOKEN

environments:
  uat:
    cpu: 2048
    memory: 4096
    count: 1
    exec: true
    variables:
      IMAP_SERVER: outlook.office365.com
      IMAP_PORT: 993
      EMAIL_FOLDER: INBOX
      POLL_INTERVAL: 60
      SUBJECT_FILTER: ALARM

  prod:
    cpu: 4096
    memory: 8192
    count: 1
    exec: true
    variables:
      IMAP_SERVER: outlook.office365.com
      IMAP_PORT: 993
      EMAIL_FOLDER: INBOX
      POLL_INTERVAL: 60
      SUBJECT_FILTER: ALARM
