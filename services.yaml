# ──────────────────────────────────────────────────────────────────────
# Service Registry — maps alarms → log groups → owners → dependencies
#
# The agent uses this to look up context when investigating alerts.
# Add your services below following the template.
# ──────────────────────────────────────────────────────────────────────

services:

  qp-booking-service:
    description: "Handles flight booking, seat selection, and reservation management"
    log_groups:
      - "/copilot/qp-prod-qp-booking-webservice"
    alarms:
      - "qp-booking-service-common-error"
      - "qp-booking-service-5xx-error"
    owner_team: "booking-platform"
    teams_channel: "AWS Alerts"
    depends_on:
      - "qp-payment-service"
      - "qp-inventory-service"
    runbook: ""
    notes: "Common error alarm can fire during batch jobs around 4 AM UTC"

