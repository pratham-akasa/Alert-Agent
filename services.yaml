services:

  qp-booking-webservice:
    description: "Handles flight booking, seat selection, and reservation management"
    owner_team: "booking-platform"
    teams_channel: "AWS Alerts"
    depends_on:
      - "Nav-ods-Webservice"
      - "data-transfer-service"
    flow: 
      - "qp-booking-webservice -> Navitaire -> NavOds-Webservice -> UTAM"
      - "qp-booking-webservice -> Navitaire -> GLUE JOB -> S3"
      - "qp-booking-webservice -> Navitaire -> GLUE JOB -> QP-DWH -> ELT-FRAMEWORK -> SkyBreathe SFTP"
      - "qp-booking-webservice -> Navitaire -> GLUE JOB -> P-ESB -> DATA TRANSFER SERVICE -> INDIA APIS"
      - "qp-booking-webservice -> Navitaire -> GLUE JOB -> P-ESB -> GST"
      - "qp-booking-webservice -> Navitaire -> FNS"
    # notes: "Common error alarm can fire during batch jobs around 4 AM UTC"

