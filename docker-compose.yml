version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  alert-bot:
    build: .
    container_name: alert-bot
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      # Override Ollama URL to use service name
      - OLLAMA_BASE_URL=http://ollama:11434
      # Email credentials (use .env file or pass via environment)
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      # AWS credentials (better to use IAM roles in production)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
    volumes:
      - ./logs:/app/logs
      - ./memory.json:/app/memory.json
      - ./config.yaml:/app/config.yaml
      - ./services.yaml:/app/services.yaml
    restart: unless-stopped
    command: python main.py

volumes:
  ollama_data:
